<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Mystic Design Studio</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/main.css">

    <!-- Checkout Script (we will build this later) -->
    <script src="js/checkout.js" defer></script>
</head>

<body>

    <!-- Cosmic Background -->
    <div class="background-overlay"></div>

    <!-- HEADER -->
    <header class="site-header">
        <div class="header-inner">

            <!-- LOGO AREA -->
            <div class="logo-area">
                <a href="index.html">
                    <img src="assets/logo/logo.png" alt="Mystic Design Logo" class="site-logo">
                </a>
            </div>

            <!-- NAVIGATION -->
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="checkout.html" class="active">Checkout</a></li>
                </ul>
            </nav>

        </div>
    </header>
    <!-- CHECKOUT WRAPPER -->
    <section class="checkout-container">

        <!-- CART SUMMARY -->
        <div class="checkout-section">
            <h2>Your Cart</h2>

            <div id="cartItems" class="cart-items">
                <!-- Cart items will load here dynamically -->
            </div>

            <div class="cart-total">
                <p>Subtotal: <span id="cartSubtotal">$0.00</span></p>
                <p>Shipping: <span id="cartShipping">$0.00</span></p>
                <p class="grand-total">Total: <span id="cartTotal">$0.00</span></p>
            </div>
        </div>

        <!-- CUSTOMER INFORMATION -->
        <div class="checkout-section">
            <h2>Customer Information</h2>

            <form id="checkoutForm">

                <label for="customerName">Full Name</label>
                <input type="text" id="customerName" required>

                <label for="customerEmail">Email</label>
                <input type="email" id="customerEmail" required>

                <label for="customerPhone">Phone Number</label>
                <input type="tel" id="customerPhone">

                <h3>Shipping Address</h3>

                <label for="address1">Address Line 1</label>
                <input type="text" id="address1" required>

                <label for="address2">Address Line 2 (optional)</label>
                <input type="text" id="address2">

                <label for="city">City</label>
                <input type="text" id="city" required>

                <label for="state">State</label>
                <input type="text" id="state" required>

                <label for="zip">ZIP Code</label>
                <input type="text" id="zip" required>

                <h3>Order Notes (Optional)</h3>
                <textarea id="orderNotes" placeholder="Add any special instructions..."></textarea>

                <!-- PAYMENT BUTTON PLACEHOLDER -->
                <button type="submit" class="checkout-btn">
                    Complete Order
                </button>

            </form>
        </div>

    </section>
    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="footer-inner">

            <div class="footer-links">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="faq.html">FAQ</a>
                <a href="terms.html">Terms</a>
                <a href="privacy.html">Privacy</a>
            </div>

            <!-- Hidden Admin Link -->
            <div class="admin-link">
                <a href="admin.html">Admin Login</a>
            </div>

            <p class="copyright">
                © 2026 Mystic Design Studio. All rights reserved.
            </p>

        </div>
    </footer>

</body>
</html>
