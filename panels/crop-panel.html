<!-- /editor/panels/crop-panel.html -->

<div id="crop-panel" class="editor-panel">
    <h3>Crop</h3>

    <div class="dpi-indicator">
        <span id="crop-dpi-value">300 DPI</span>
        <span id="crop-dpi-status" class="good">High Quality</span>
    </div>

    <button id="crop-apply" class="panel-btn apply">Apply Crop</button>
    <button id="crop-cancel" class="panel-btn cancel">Cancel</button>

    <label class="safezone-toggle">
        <input type="checkbox" id="crop-safezone-toggle">
        Show Safe Zone
    </label>
</div>
