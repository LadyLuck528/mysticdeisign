<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Design</title>

    <link rel="stylesheet" href="css/styles.css">

</head>
<body>

    <!-- HERO SECTION -->
    <section id="hero">
        <h1>Mystic Design</h1>
        <p>Your portal to creation.</p>
        <button>Enter</button>
    </section>

<section id="pillars">
    <div class="pillar">
        <div class="icon">✦</div>
        Create
    </div>

    <div class="pillar">
        <div class="icon">✧</div>
        Design
    </div>

    <div class="pillar">
        <div class="icon">✹</div>
        Transform
    </div>
</section>



    <!-- TOOLS PREVIEW -->
    <section id="tools">
        <h2>Tools & Services</h2>
        <div class="tool-card">Custom Printing</div>
        <div class="tool-card">Design Tools</div>
        <div class="tool-card">Templates</div>
        <div class="tool-card">Marketplace</div>
        <div class="tool-card">Upload & Order</div>
    </section>

    <!-- FEATURED PRODUCTS -->
    <section id="featured">
        <h2>Featured Products</h2>
        <div class="product-card">Product 1</div>
        <div class="product-card">Product 2</div>
        <div class="product-card">Product 3</div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© Mystic Design</p>
    </footer>

</body>
</html>
