<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mystic Editor</title>

    <!-- Cosmic UI Styles -->
    <link rel="stylesheet" href="css/mystic-ui.css">

</head>

<body>
<div id="mystic-app">

    <!-- LEFT TOOLBAR (340px) -->
    <aside id="left-toolbar">
        <div class="toolbar-section">

            <!-- Each tool has icon + label -->
            <button class="tool-btn" data-flyout="text-flyout">
                <span class="icon">✎</span>
                <span class="label">Text</span>
            </button>

            <button class="tool-btn" data-flyout="shapes-flyout">
                <span class="icon">⬛</span>
                <span class="label">Shapes</span>
            </button>

            <button class="tool-btn" id="upload-tool">
                <span class="icon">⭳</span>
                <span class="label">Upload</span>
            </button>

            <button class="tool-btn" data-flyout="brush-flyout">
                <span class="icon">🖌️</span>
                <span class="label">Brush</span>
            </button>

            <button class="tool-btn" data-flyout="eraser-flyout">
                <span class="icon">⌫</span>
                <span class="label">Eraser</span>
            </button>

            <button class="tool-btn" id="select-tool">
                <span class="icon">🖱️</span>
                <span class="label">Select</span>
            </button>

            <button class="tool-btn" data-flyout="color-flyout">
                <span class="icon">🎨</span>
                <span class="label">Color</span>
            </button>

            <button class="tool-btn" data-flyout="stroke-flyout">
                <span class="icon">🖍️</span>
                <span class="label">Stroke</span>
            </button>

            <button class="tool-btn" data-flyout="shadow-flyout">
                <span class="icon">🌑</span>
                <span class="label">Shadow</span>
            </button>

            <button class="tool-btn" data-flyout="align-flyout">
                <span class="icon">☰</span>
                <span class="label">Align</span>
            </button>

            <button class="tool-btn" data-flyout="filters-flyout">
                <span class="icon">✨</span>
                <span class="label">Filters</span>
            </button>

            <button class="tool-btn" data-flyout="bgremove-flyout">
                <span class="icon">✂️</span>
                <span class="label">BG Remove</span>
            </button>

            <button class="tool-btn" data-flyout="magicwand-flyout">
                <span class="icon">🪄</span>
                <span class="label">Magic Wand</span>
            </button>

            <button class="tool-btn" data-flyout="gradient-flyout">
                <span class="icon">▨</span>
                <span class="label">Gradient</span>
            </button>

            <button class="tool-btn" data-flyout="pattern-flyout">
                <span class="icon">▦</span>
                <span class="label">Pattern</span>
            </button>

            <button class="tool-btn" data-flyout="stickers-flyout">
                <span class="icon">💫</span>
                <span class="label">Stickers</span>
            </button>

            <button class="tool-btn" data-flyout="templates-flyout">
                <span class="icon">📐</span>
                <span class="label">Templates</span>
            </button>

            <button class="tool-btn" id="snap-grid">
                <span class="icon">#</span>
                <span class="label">Snap</span>
            </button>

            <button class="tool-btn" id="ruler-guides">
                <span class="icon">📏</span>
                <span class="label">Guides</span>
            </button>

            <button class="tool-btn" id="undo-btn">
                <span class="icon">↶</span>
                <span class="label">Undo</span>
            </button>

            <button class="tool-btn" id="redo-btn">
                <span class="icon">↷</span>
                <span class="label">Redo</span>
            </button>

            <button class="tool-btn" id="zoom-tool">
                <span class="icon">🔍</span>
                <span class="label">Zoom</span>
            </button>

        </div>
    </aside>

    <!-- CENTER CANVAS AREA -->
    <main id="canvas-area">
        <div id="canvas-glow"></div>
        <canvas id="design-canvas" width="1920" height="1080"></canvas>
    </main>

    <!-- RIGHT PANEL (340px) -->
    <aside id="right-panel">

        <!-- LAYERS PANEL (TOP) -->
        <section id="layers-panel">
            <h2 class="panel-title">Layers</h2>
            <div id="layers-list"></div>
        </section>

        <!-- AI PANEL (BOTTOM) -->
        <section id="ai-panel">
            <h2 class="panel-title">AI Generator</h2>
            <textarea id="ai-prompt" placeholder="Describe your image..."></textarea>
            <button id="ai-generate-btn" class="primary-btn">Generate</button>
        </section>

    </aside>

    <!-- BOTTOM CENTER BUTTONS -->
    <div id="bottom-buttons">
        <button class="primary-btn">Upload</button>
        <button class="primary-btn">Preview</button>
        <button class="primary-btn green-btn">Add to Cart</button>
    </div>

</div>

<!-- JS Files -->
<script src="js/editor.js"></script>
<script src="js/tools.js"></script>
<script src="js/panels.js"></script>
<script src="js/ui.js"></script>


</body>
</html>
