<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Editor - Mystic Design Studio</title>

    <!-- Main CSS -->
    <!-- Editor CSS -->
<link rel="stylesheet" href="editor/css/global.css">
<link rel="stylesheet" href="editor/css/editor.css">
<link rel="stylesheet" href="editor/css/editor-layout.css">
<link rel="stylesheet" href="editor/css/editor-panels.css">
<link rel="stylesheet" href="editor/css/editor-tools.css">
<link rel="stylesheet" href="editor/css/canvas.css">
<link rel="stylesheet" href="editor/css/toolbar.css">
<link rel="stylesheet" href="editor/css/sidebar.css">
<link rel="stylesheet" href="editor/css/preview.css">
<link rel="stylesheet" href="editor/css/animations.css">

    <!-- Editor Scripts -->
    <!-- Editor JS -->
<script src="editor/js/editor.js" defer></script>
<script src="editor/js/3d-engine.js" defer></script>


</head>

<body class="editor-pro dark-mode">

    <!-- Cosmic Background -->
    <div class="background-overlay"></div>

    <!-- TOP ACTION BAR -->
    <header class="editor-topbar">
        <div class="topbar-left">
            <div class="editor-logo">Mystic Design Studio</div>
        </div>

        <div class="topbar-center">
            <button class="topbar-btn" id="undoBtn">Undo</button>
            <button class="topbar-btn" id="redoBtn">Redo</button>
            <button class="topbar-btn" id="zoomInBtn">Zoom +</button>
            <button class="topbar-btn" id="zoomOutBtn">Zoom -</button>
            <button class="topbar-btn" id="toggleGridBtn">Grid</button>
        </div>

        <div class="topbar-right">
            <button id="simpleModeBtn" class="mode-btn">Simple</button>
            <button id="proModeBtn" class="mode-btn active">Pro</button>
        </div>
    </header>

    <!-- MAIN EDITOR LAYOUT -->
    <div class="editor-layout">

        <!-- LEFT TOOLBAR (ICON-BASED) -->
        <aside class="editor-toolbar">

            <button class="tool-btn" data-tool="select" title="Select">
                🖱
            </button>

            <button class="tool-btn" data-tool="hand" title="Hand Tool">
                ✋
            </button>

            <button class="tool-btn" data-tool="pen" title="Pen Tool">
                ✏️
            </button>

            <button class="tool-btn" data-tool="rect" title="Rectangle">
                🔲
            </button>

            <button class="tool-btn" data-tool="circle" title="Circle">
                ⚪
            </button>

            <button class="tool-btn" data-tool="text" title="Add Text">
                🔤
            </button>

            <button class="tool-btn" data-tool="upload" title="Upload Image">
                🖼
            </button>

            <button class="tool-btn" data-tool="color" title="Color Picker">
                🎨
            </button>

            <button class="tool-btn" data-tool="ai" title="AI Image Generator">
                🧙
            </button>

            <button class="tool-btn" data-tool="layers" title="Layers">
                🧩
            </button>

            <button class="tool-btn" data-tool="settings" title="Settings">
                ⚙️
            </button>

        </aside>

        <!-- CENTER CANVAS AREA -->
        <main class="editor-canvas-area">

            <!-- Canvas Wrapper -->
            <div class="canvas-wrapper">

                <!-- 3D Model Viewer -->
                <div id="modelViewer" class="model-viewer"></div>

                <!-- Mask Overlay -->
                <img id="maskOverlay" class="mask-overlay" src="" alt="Mask Overlay">

                <!-- Main Canvas -->
                <canvas id="designCanvas" class="design-canvas"></canvas>

                <!-- Drawing Layer -->
                <canvas id="drawLayer" class="editor-draw-layer"></canvas>

                <!-- Grid Overlay -->
                <div class="editor-grid-overlay" id="gridOverlay"></div>

            </div>
        </main>

        <!-- RIGHT PANELS -->
        <aside class="editor-panels">

            <!-- LAYERS PANEL -->
            <div class="panel" id="layersPanel">
                <div class="panel-title">Layers</div>
                <div id="layerList" class="layer-list"></div>
            </div>

            <!-- PROPERTIES PANEL -->
            <div class="panel" id="propertiesPanel">
                <div class="panel-title">Properties</div>

                <div class="panel-section">
                    <label>Color</label>
                    <input type="color" id="colorPicker" value="#ffffff">
                </div>

                <div class="panel-section">
                    <label>Position</label>
                    <input type="number" id="posX" placeholder="X">
                    <input type="number" id="posY" placeholder="Y">
                </div>

                <div class="panel-section">
                    <label>Size</label>
                    <input type="number" id="widthInput" placeholder="Width">
                    <input type="number" id="heightInput" placeholder="Height">
                </div>

                <div class="panel-section">
                    <label>Mode</label>
                    <select id="layerMode">
                        <option value="print">Print Only</option>
                        <option value="cut">Cut Only</option>
                        <option value="printcut">Print & Cut</option>
                    </select>
                </div>

            </div>

            <!-- AI PANEL -->
            <div class="panel" id="aiPanel">
                <div class="panel-title">AI Image Generator</div>

                <input id="aiPrompt" type="text" placeholder="Describe what to create...">
                <button id="aiGenerateBtn" class="panel-btn">Generate</button>
                <div id="aiStatus" class="ai-status"></div>
            </div>

        </aside>

    </div>

    <!-- BOTTOM STATUS BAR -->
    <footer class="editor-statusbar">
        <div id="statusPosition">X: 0 | Y: 0</div>
        <div id="statusZoom">Zoom: 100%</div>
        <div id="statusLayer">No layer selected</div>
    </footer>

</body>
</html>
