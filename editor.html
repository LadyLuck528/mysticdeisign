<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mystic Editor</title>
<link rel="stylesheet" href="css/mystic-ui.css">
</head>
<body>
<div id="mystic-app">
    <!-- LEFT TOOLBAR -->
    <div id="left-toolbar">
        <div class="toolbar-section">
            <button class="tool-btn" id="text-tool">
                <span class="icon">T</span>
                <span>Text</span>
            </button>
            <button class="tool-btn" id="shape-tool">
                <span class="icon">▭</span>
                <span>Rectangle</span>
            </button>
            <button class="tool-btn" id="upload-tool">
                <span class="icon">⭳</span>
                <span>Upload Image</span>
            </button>
            <button class="tool-btn" id="zoom-tool">
                <span class="icon">🔍</span>
                <span>Zoom</span>
            </button>
            <button class="tool-btn" id="undo-btn">
                <span class="icon">↺</span>
                <span>Undo</span>
            </button>
            <button class="tool-btn" id="redo-btn">
                <span class="icon">↻</span>
                <span>Redo</span>
            </button>
        </div>
    </div>

    <!-- TEXT TOOL FLYOUT -->
    <div class="tool-flyout" id="text-flyout">
        <div class="tool-flyout-title">Text Options</div>
        <button id="tool-text" class="tool-button">
  <i class="icon-text">T</i>
</button>


<div>Fonts</div>
        <div class="font-list" id="font-list"></div>
        <!-- you can add size, color controls later -->
    </div>

    <!-- CANVAS AREA -->
    <div id="canvas-area">
        <div id="canvas-glow"></div>
        <div id="canvas-wrapper">
            <canvas id="design-canvas"></canvas>
        </div>
        <div id="bottom-buttons">
            <button class="primary-btn">Upload</button>
            <button class="primary-btn">Preview</button>
            <button class="primary-btn green-btn">Add to Cart</button>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div id="right-panel">
        <div class="panel-title">Layers</div>
        <div id="layers-panel">
            <div id="layers-list"></div>
        </div>

        <div class="panel-title">AI Image</div>
        <div id="ai-panel">
            <textarea id="ai-prompt" placeholder="Describe the image you want..."></textarea>
            <button id="ai-generate-btn">Generate AI Image</button>
        </div>
    </div>
</div>
editor
<script src="js/editor.js"></script>
<script src="js/fontloader.js"></script>
<script type="module" src="js/mystic-editor.js"></script>

</body>
</html>
